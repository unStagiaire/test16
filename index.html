<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lycéopolis - Supabase + Authentification</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  /* ========== VOS STYLES EXISTANTS ========== */
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --navy: #0d1b2a;
    --navy-mid: #1a2e45;
    --navy-light: #243b55;
    --cream: #f5f0e8;
    --red: #c0392b;
    --green: #27ae60;
    --accent: #e67e22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--cream);
    min-height: 100vh;
  }
  h1, h2, h3 { font-family: 'Playfair Display', serif; }
  .gold { color: var(--gold); }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    font-weight: 700;
    border: none;
    border-radius: 6px;
    padding: 10px 22px;
    cursor: pointer;
  }
  .btn-outline {
    background: transparent;
    color: var(--gold);
    border: 1.5px solid var(--gold);
    border-radius: 6px;
    padding: 9px 20px;
    cursor: pointer;
  }
  .btn-danger {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 9px 18px;
    cursor: pointer;
  }
  .card {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,.18);
    border-radius: 12px;
    padding: 16px;
  }
  .screen { display: none; }
  .screen.active { display: flex; }
  input, textarea, select {
    background: var(--navy-light);
    border: 1.5px solid rgba(201,168,76,.3);
    border-radius: 8px;
    color: var(--cream);
    padding: 10px 14px;
    width: 100%;
    outline: none;
  }
  input:focus { border-color: var(--gold); }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-box {
    background: var(--navy-mid);
    border: 1px solid var(--gold);
    border-radius: 14px;
    padding: 24px;
    max-width: 400px;
    width: 90%;
  }
  .notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--navy-light);
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 12px 20px;
    z-index: 9999;
    animation: slideIn .3s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .progress-bar {
    height: 4px;
    background: rgba(201,168,76,.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width .5s;
  }
  .stat-box {
    background: var(--navy-light);
    border-radius: 8px;
    padding: 12px 16px;
    text-align: center;
  }
  .online-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 4px;
  }
  .level-badge {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 800;
  }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .game-layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 240px; background: var(--navy-mid); border-left: 1px solid rgba(201,168,76,.12); overflow-y: auto; }
  @media (max-width: 640px) {
    .game-layout { flex-direction: column; }
    .sidebar { width: 100%; max-height: 200px; }
  }
  .post-card {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,.12);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
  .status-connected { background: #27ae60; }
</style>
</head>
<body>

<div id="notifContainer"></div>

<!-- ==================== ÉCRAN DE CONNEXION ==================== -->
<div id="screen-login" class="screen active min-h-screen flex-col items-center justify-center p-6">
  <div class="w-full max-w-sm">
    <div class="text-center mb-10">
      <h1 class="text-5xl gold mb-2">Lycéopolis</h1>
      <p style="color:rgba(245,240,232,.5); font-size:13px;">Version synchro - Authentification administrateur</p>
    </div>
    <div class="card p-6">
      <h2 class="text-lg mb-5">Connexion</h2>
      <div class="mb-4">
        <label style="font-size:12px;">Pseudonyme</label>
        <input type="text" id="loginUser" placeholder="Votre pseudo" class="mt-1"/>
      </div>
      <div class="mb-6">
        <label style="font-size:12px;">Mot de passe</label>
        <input type="password" id="loginPass" placeholder="••••••••" class="mt-1"/>
      </div>
      <button class="btn-gold w-full" onclick="doLogin()">Se connecter →</button>
      <p id="loginError" style="color:#ff6b6b; font-size:12px; margin-top:10px; display:none;">Identifiants incorrects.</p>
    </div>
    <p class="text-center mt-4" style="font-size:11px;">⚡ Tous les messages sont synchronisés entre tous les joueurs !</p>
  </div>
</div>

<!-- ==================== ÉCRAN PRINCIPAL (MENU) ==================== -->
<div id="screen-menu" class="screen min-h-screen flex-col" style="display:none;">
  <div style="background:var(--navy-mid); padding:12px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
    <h1 class="text-xl gold">Lycéopolis</h1>
    <div class="flex items-center gap-3">
      <span id="menuUserDisplay"></span>
      <button class="btn-outline" style="padding:6px 12px;" onclick="showProfile()">Mon Profil</button>
      <button class="btn-danger" style="padding:6px 12px;" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>
  <div class="flex-1 p-5 max-w-4xl mx-auto w-full">
    <div class="card p-5 mb-5">
      <h2 class="text-xl" id="welcomeMsg"></h2>
      <p style="font-size:13px; color:rgba(245,240,232,.5);" id="subMsg"></p>
    </div>
    <div class="grid grid-cols-3 gap-3 mb-5">
      <div class="stat-box"><div class="text-xl gold font-bold" id="stat-level">0</div><div style="font-size:11px;">Niveau</div></div>
      <div class="stat-box"><div class="text-xl gold font-bold" id="stat-money">0€</div><div style="font-size:11px;">Argent</div></div>
      <div class="stat-box"><div class="text-xl gold font-bold" id="stat-exp">0</div><div style="font-size:11px;">EXP</div></div>
    </div>
    <div class="card p-4 mb-5">
      <div class="flex justify-between items-center mb-2"><span style="font-size:12px;">Progression niveau</span><span id="expBarLabel" class="gold"></span></div>
      <div class="progress-bar"><div class="progress-fill" id="expBarFill" style="width:0%"></div></div>
    </div>

    <!-- Chat global -->
    <div class="card" style="display: flex; flex-direction: column; height: 350px; margin-bottom: 20px;">
      <div style="border-bottom: 1px solid rgba(201,168,76,.15); padding: 10px 15px;">
        <h3 class="text-base gold">💬 Discussion globale</h3>
      </div>
      <div id="messagesList" style="flex: 1; overflow-y: auto; padding: 15px;"></div>
      <div style="padding: 12px; border-top: 1px solid rgba(201,168,76,.15); display: flex; gap: 8px;">
        <input type="text" id="messageInput" placeholder="Message instantané..." style="flex:1;" onkeypress="if(event.key==='Enter') sendMessage()"/>
        <button class="btn-gold" onclick="sendMessage()">Envoyer</button>
      </div>
    </div>

    <!-- Joueurs en ligne -->
    <div class="card">
      <h3 class="text-sm gold mb-2">👥 En ligne (<span id="playerCount">0</span>)</h3>
      <div id="playersList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
    </div>

    <!-- Actions rapides -->
    <div class="card mt-4">
      <h3 class="text-sm gold mb-2">🎮 Actions</h3>
      <div class="flex gap-2 flex-wrap">
        <button class="btn-gold" onclick="sendAction('vote_honnete')">🗳️ Voter Honnête</button>
        <button class="btn-gold" onclick="sendAction('vote_fraud')">🎭 Voter Frauduleux</button>
        <button class="btn-outline" onclick="workForMoney()">💪 Travailler (+50€)</button>
        <button class="btn-outline" onclick="openGiveModal()">💰 Donner argent</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal donner argent -->
<div id="giveModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3 class="gold mb-3">💰 Donner de l'argent</h3>
    <select id="giveTarget" class="mb-3"></select>
    <input type="number" id="giveAmount" placeholder="Montant" class="mb-3"/>
    <div class="flex gap-2">
      <button class="btn-gold" onclick="submitGive()">Donner</button>
      <button class="btn-outline" onclick="closeModal('giveModal')">Annuler</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// AUTHENTIFICATION ADMIN (VOTRE SYSTÈME ORIGINAL)
// ============================================================
const usersDB = {
  "momo": { password: "momo78" },
  "luffy": { password: "zoro1111" },
  "goku": { password: "ssj4" },
  "thomas": { password: "r834sk" },
  "kiwi_jaune": { password: "srt065" },
  "testeur002": { password: "greay67" },
  "présidents_futuriste": { password: "gtw54" }
};

// ============================================================
// CONFIGURATION SUPABASE (à remplacer par vos valeurs)
// ============================================================
const SUPABASE_URL = "https://zgskrkkhxtwhyrxatacz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnc2tya2toeHRod3lyeGF0YWN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjc2MTcsImV4cCI6MjA5NTkwMzYxN30.EZDkIFTQqlK5k1E8CGOecdAE3kYF2bpGxXh9ECp0Tdo"; // <--- REMPLACEZ PAR VOTRE CLÉ (ligne 299)
// ============================================================

let supabase = null;
let currentUser = null;
let currentAccount = null;

// Fonctions EXP (comme original)
function expForLevel(lvl) {
  if (lvl === 0) return 0;
  let total = 0;
  for (let i = 0; i < lvl; i++) total += 100 + i * 20;
  return total;
}
function calcLevel(totalExp) {
  let lvl = 0;
  while (totalExp >= expForLevel(lvl + 1)) lvl++;
  return lvl;
}
function expInCurrentLevel(totalExp, lvl) {
  return totalExp - expForLevel(lvl);
}
function expForNextLevel(lvl) {
  return 100 + lvl * 20;
}

// Initialiser Supabase
function initSupabase() {
  supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return true;
}

// ========== CHARGEMENT DES DONNÉES DEPUIS SUPABASE ==========
async function loadMessages() {
  if (!supabase) return;
  const { data } = await supabase
    .from('messages')
    .select('*')
    .order('timestamp', { ascending: true })
    .limit(200);
  renderMessages(data || []);
}

async function loadAccount(user) {
  if (!supabase) return;
  const { data } = await supabase
    .from('accounts')
    .select('*')
    .eq('user_name', user)
    .single();
  currentAccount = data || { money: 1000, exp: 0 };
  updateStatsDisplay(currentAccount);
}

async function updatePresence() {
  if (!supabase || !currentUser) return;
  await supabase.from('players').upsert({ user_name: currentUser, last_seen: Date.now() });
}

async function cleanupPlayers() {
  if (!supabase) return;
  const timeout = Date.now() - 60000;
  await supabase.from('players').delete().lt('last_seen', timeout);
}

async function renderPlayers() {
  if (!supabase) return;
  const { data } = await supabase.from('players').select('user_name');
  const players = data || [];
  document.getElementById('playerCount').innerText = players.length;
  const container = document.getElementById('playersList');
  if (container) {
    container.innerHTML = players.map(p => `
      <div style="background:var(--navy-light); padding:6px 12px; border-radius:20px;">
        <span class="online-dot"></span> ${escapeHtml(p.user_name)}
      </div>
    `).join('');
  }
}

// ========== ACTIONS SUR L'ARGENT/EXP ==========
async function addExp(user, amount) {
  if (!supabase) return;
  const { data: existing } = await supabase
    .from('accounts')
    .select('*')
    .eq('user_name', user)
    .single();
  const newExp = (existing?.exp || 0) + amount;
  if (existing) {
    await supabase.from('accounts').update({ exp: newExp }).eq('user_name', user);
  } else {
    await supabase.from('accounts').insert({ user_name: user, money: 1000, exp: newExp });
  }
  if (user === currentUser) await loadAccount(user);
}

async function addMoney(user, amount) {
  if (!supabase) return;
  const { data: existing } = await supabase
    .from('accounts')
    .select('*')
    .eq('user_name', user)
    .single();
  const newMoney = (existing?.money || 1000) + amount;
  if (existing) {
    await supabase.from('accounts').update({ money: newMoney }).eq('user_name', user);
  } else {
    await supabase.from('accounts').insert({ user_name: user, money: newMoney, exp: 0 });
  }
  if (user === currentUser) await loadAccount(user);
}

// ========== ENVOYER UN MESSAGE ==========
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const content = input.value.trim();
  if (!content || !supabase || !currentUser) return;
  await supabase.from('messages').insert({
    user_name: currentUser,
    content: content,
    timestamp: Date.now(),
    is_system: false
  });
  await addExp(currentUser, 1);
  input.value = '';
}

// ========== ACTIONS JEU ==========
async function sendAction(action) {
  if (!supabase || !currentUser) return;
  let actionMessage = "";
  let expGain = 5;
  if (action === 'vote_honnete') {
    actionMessage = `🗳️ ${currentUser} a voté pour le candidat HONNÊTE`;
    expGain = 10;
  } else if (action === 'vote_fraud') {
    actionMessage = `🎭 ${currentUser} a voté pour le candidat FRAUDULEUX`;
    expGain = 5;
  }
  await supabase.from('messages').insert({
    user_name: "📢 Système",
    content: actionMessage,
    timestamp: Date.now(),
    is_system: true
  });
  await addExp(currentUser, expGain);
  notify(`Action effectuée ! +${expGain} EXP`);
}

async function workForMoney() {
  await addMoney(currentUser, 50);
  await addExp(currentUser, 2);
  await supabase.from('messages').insert({
    user_name: "💼 Travail",
    content: `${currentUser} a travaillé et gagné 50€ !`,
    timestamp: Date.now(),
    is_system: true
  });
  notify("+50€ et +2 EXP !");
}

async function openGiveModal() {
  const { data } = await supabase.from('players').select('user_name');
  const players = data?.filter(p => p.user_name !== currentUser).map(p => p.user_name) || [];
  const select = document.getElementById('giveTarget');
  select.innerHTML = players.map(p => `<option value="${p}">${p}</option>`).join('');
  if (select.innerHTML === '') select.innerHTML = '<option value="">Aucun autre joueur</option>';
  document.getElementById('giveModal').style.display = 'flex';
}

async function submitGive() {
  const target = document.getElementById('giveTarget').value;
  const amount = parseInt(document.getElementById('giveAmount').value);
  if (isNaN(amount) || amount <= 0) { notify("Montant invalide"); return; }
  const { data: sender } = await supabase
    .from('accounts')
    .select('money')
    .eq('user_name', currentUser)
    .single();
  if (!sender || sender.money < amount) { notify("Pas assez d'argent !"); return; }
  await supabase.from('accounts').update({ money: sender.money - amount }).eq('user_name', currentUser);
  const { data: receiver } = await supabase.from('accounts').select('money').eq('user_name', target).single();
  if (receiver) {
    await supabase.from('accounts').update({ money: receiver.money + amount }).eq('user_name', target);
  } else {
    await supabase.from('accounts').insert({ user_name: target, money: 1000 + amount, exp: 0 });
  }
  await supabase.from('messages').insert({
    user_name: "💰 Transaction",
    content: `${currentUser} a donné ${amount}€ à ${target}`,
    timestamp: Date.now(),
    is_system: true
  });
  await loadAccount(currentUser);
  closeModal('giveModal');
  notify(`${amount}€ donnés à ${target} !`);
}

// ========== AFFICHAGE ==========
function renderMessages(messages) {
  const container = document.getElementById('messagesList');
  if (!container) return;
  if (messages.length === 0) {
    container.innerHTML = '<div style="text-align:center; color:rgba(245,240,232,.4);">Aucun message. Lancez la conversation !</div>';
    return;
  }
  container.innerHTML = messages.map(msg => {
    const time = new Date(msg.timestamp).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    if (msg.is_system) {
      return `<div style="text-align:center; margin:8px 0;"><span style="background:rgba(201,168,76,.15); padding:4px 12px; border-radius:20px; font-size:11px;">${escapeHtml(msg.content)}</span></div>`;
    }
    return `<div style="margin-bottom:12px;">
      <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:4px;">
        <span style="font-weight:600; font-size:13px; color:var(--gold);">${escapeHtml(msg.user_name)}</span>
        <span style="font-size:10px; color:rgba(245,240,232,.4);">${time}</span>
      </div>
      <p style="font-size:13px; line-height:1.5;">${escapeHtml(msg.content)}</p>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function updateStatsDisplay(account) {
  const exp = account?.exp || 0;
  const level = calcLevel(exp);
  const expInLvl = expInCurrentLevel(exp, level);
  const expNeeded = expForNextLevel(level);
  const pct = Math.min(100, Math.round((expInLvl / expNeeded) * 100));
  document.getElementById('stat-level').innerText = level;
  document.getElementById('stat-money').innerText = (account?.money || 1000) + '€';
  document.getElementById('stat-exp').innerText = exp;
  document.getElementById('expBarFill').style.width = pct + '%';
  document.getElementById('expBarLabel').innerText = `${expInLvl}/${expNeeded} EXP`;
  document.getElementById('menuUserDisplay').innerHTML = `<span class="online-dot"></span> ${currentUser} <span class="level-badge">Niv.${level}</span> <span class="gold">${account?.money || 1000}€</span>`;
  document.getElementById('welcomeMsg').innerHTML = `Bienvenue, ${currentUser} !`;
  document.getElementById('subMsg').innerHTML = `Niveau ${level} - ${exp} EXP total`;
}

function showProfile() {
  alert(`👤 ${currentUser}\n💰 Argent: ${currentAccount?.money || 1000}€\n⭐ EXP: ${currentAccount?.exp || 0}\n📊 Niveau: ${calcLevel(currentAccount?.exp || 0)}`);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function notify(msg) {
  const container = document.getElementById('notifContainer');
  const el = document.createElement('div');
  el.className = 'notification';
  el.innerHTML = `<span>✨ ${escapeHtml(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// ========== AUTHENTIFICATION ==========
async function doLogin() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const errorDiv = document.getElementById('loginError');
  
  if (!usersDB[user] || usersDB[user].password !== pass) {
    errorDiv.style.display = 'block';
    return;
  }
  errorDiv.style.display = 'none';
  
  currentUser = user;
  if (!initSupabase()) return;
  
  // Créer le compte dans Supabase s'il n'existe pas
  const { data: existing } = await supabase
    .from('accounts')
    .select('*')
    .eq('user_name', user)
    .single();
  if (!existing) {
    await supabase.from('accounts').insert({ user_name: user, money: 1000, exp: 0 });
  }
  
  await updatePresence();
  
  // Abonnements temps réel
  supabase.channel('messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages())
    .subscribe();
  supabase.channel('players')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => renderPlayers())
    .subscribe();
  supabase.channel('accounts')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'accounts' }, () => loadAccount(currentUser))
    .subscribe();
  
  await loadMessages();
  await loadAccount(user);
  await renderPlayers();
  
  // Message système
  await supabase.from('messages').insert({
    user_name: "📢 Système",
    content: `👋 ${user} a rejoint la partie !`,
    timestamp: Date.now(),
    is_system: true
  });
  
  // Afficher l'écran principal
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById('screen-menu').style.display = 'flex';
  
  setInterval(() => updatePresence(), 25000);
  setInterval(() => cleanupPlayers(), 30000);
  notify(`Bienvenue ${user} !`);
}

async function doLogout() {
  if (supabase && currentUser) {
    await supabase.from('players').delete().eq('user_name', currentUser);
    await supabase.from('messages').insert({
      user_name: "📢 Système",
      content: `👋 ${currentUser} a quitté la partie.`,
      timestamp: Date.now(),
      is_system: true
    });
  }
  currentUser = null;
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

// Rendre les fonctions globales
